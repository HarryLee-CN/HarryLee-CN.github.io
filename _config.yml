# 站点配置

# 引入主题
theme: jekyll-theme-chirpy

# 网站语言（参考语言代码）› http://www.lingoes.net/en/translator/langcode.htm
# 如果语言与 _data/locales 中的文件同名，则布局语言也会同步修改，否则默认使用 en
lang: en

# 设置时区 › https://zones.arilyn.cc
timezone: Asia/Shanghai

# jekyll-seo-tag 配置 settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------（SEO 配置开始）

title: Harry Lee # 网站主标题

tagline: Personal Technical Blog # 副标题

description: >- # 用于 SEO meta 和 Atom 订阅
  Harry Lee's Personal Technical Blog

# 网站完整地址（不以 / 结尾）
url: "https://qiuqi.li"

github:
  username: HarryLee-CN # 修改为你的 GitHub 用户名

twitter:
  username: harrylee_cn # 修改为你的 Twitter 用户名

social:
  # 填写你的姓名（默认作者名）
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Harry Lee
  email: mail@qiuqi.li # 修改为你的邮箱
  fediverse_handle: # 填写你的联邦宇宙账号（可选）
  links:
    # 第一个链接会作为版权链接
    - https://x.com/harrylee_cn # 修改为你的 X 首页
    - https://github.com/HarryLee-CN # 修改为你的 GitHub 首页
    # 取消注释以添加更多社交链接
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 站点验证配置
webmaster_verifications:
  google: # 填写 Google 验证码
  bing: # 填写 Bing 验证码
  alexa: # 填写 Alexa 验证码
  yandex: # 填写 Yandex 验证码
  baidu: # 填写 Baidu 验证码
  facebook: # 填写 Facebook 验证码

# ↑ --------------------------（SEO 配置结束）

# 网站统计配置
analytics:
  google:
    id: G-B0XNR2TSRZ
  goatcounter:
    id: # 填写对应统计工具 ID
  umami:
    id: # 填写对应统计工具 ID
    domain: # 填写对应统计工具域名
  matomo:
    id: # 填写对应统计工具 ID
    domain: # 填写对应统计工具域名
  cloudflare:
    id: # 填写对应统计工具令牌
  fathom:
    id: # 填写对应统计工具 ID

# 页面浏览统计
pageviews:
  provider: # 当前仅支持 goatcounter

# 首选配色方案设置。
#
# 注意：保持为空将默认跟随系统偏好配色，
# 并且侧边栏左下角会显示切换主题的开关。
#
# 可选值：
#
#     light — 使用浅色主题
#     dark — 使用深色主题
#
theme_mode: # [light | dark]

# CDN 配置（用于加速静态资源）
# 一旦配置，CDN 地址会被添加到所有以 '/' 开头的媒体资源路径中（头像、文章图片、音视频文件等）
#
# 例如 'https://cdn.com'
cdn: ""

# 侧边栏头像，支持本地或跨域资源
avatar: "/assets/img/avatar.png"

# SEO 分享预览图，支持本地或跨域资源
# 可被页面 front matter 中的 page.image 覆盖
social_preview_image: # 字符串，本地或跨域资源

# 是否开启文章目录
toc: true

comments:
  # 全局评论系统开关，留空表示关闭
  provider: disqus # [disqus | utterances | giscus]
  # 各评论系统配置如下：
  disqus:
    shortname: qiuqi-li # 填写 Disqus shortname › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 配置 › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus 配置 › https://giscus.app
  giscus:
    repo: # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping: # 可选，默认 'pathname'
    strict: # 可选，默认 '0'
    input_position: # 可选，默认 'bottom'
    lang: # 可选，默认 site.lang 的值
    reactions_enabled: # 可选，默认 '1'

# 自托管静态资源，可选 › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # 布尔值，留空表示关闭
    # 指定 Jekyll 环境，留空表示全部环境
    # 仅在 enabled 为 true 时生效
    env: # [development | production]

pwa:
  enabled: true # PWA 功能开关（是否可安装）
  cache:
    enabled: true # PWA 离线缓存开关
    # 以下路径不会被 PWA 缓存
    # 通常是同域名下其他网站的 baseurl
    deny_paths:
      # - "/example"  # 匹配 <SITE_URL>/example/* 的 URL 不缓存

# 分页数量
paginate: 10

# 站点基础路径
baseurl: ""

# 以下配置不建议修改

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 选项 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # 空字符串表示项目所有文件
      type: posts
    values:
      layout: post
      comments: true # 启用文章评论
      toc: true # 文章显示目录
      # 除非非常确定，否则不要修改此参数
      # 否则会导致所有文章链接失效
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # 参见 site.collections
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

#
# 保留 ads.txt 文件，使其可通过 /ads.txt 访问，方便 AdSense 验证。
# 不要修改 _includes/head.html 来添加 AdSense 代码，
# 这样会覆盖 Chirpy 的原始 head 导致样式和脚本异常。
# 自定义 head 代码请放在 _includes/metadata-hook.html 中。
include:
  - ads.txt

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
